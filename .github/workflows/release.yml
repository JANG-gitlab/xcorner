name: release

# Declenche un build cross-platform et publie une Release GitHub avec les
# installeurs Mac (DMG arm64+x64), Windows (NSIS .exe) et Linux (AppImage).
#
# Usage : creer et pousser un tag commencant par v, ex :
#   git tag v1.0.0 && git push --tags
# Ou utiliser le bouton "Run workflow" dans l'onglet Actions.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple Silicon
            artifact_name: macos
            dist_cmd: dist:mac
          - os: ubuntu-latest
            artifact_name: linux
            dist_cmd: dist:linux
          - os: windows-latest
            artifact_name: windows
            dist_cmd: dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      # Workaround electron-builder + hdiutil sur les runners macOS :
      # Spotlight indexe le DMG en cours de build -> hdiutil detach fail.
      - name: Disable Spotlight indexing (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo mdutil -a -i off || true
          defaults write com.apple.frameworks.diskimages skip-verify -bool true || true
          defaults write com.apple.frameworks.diskimages skip-verify-locked -bool true || true
          defaults write com.apple.frameworks.diskimages skip-verify-remote -bool true || true

      - name: Build (telecharge yt-dlp + electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.dist_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: xcorner-${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
