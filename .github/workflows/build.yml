name: build

# Construit Xcorner pour Windows (installeur NSIS) et Linux (AppImage).
# Se declenche a la main (bouton "Run workflow") ou en poussant un tag v*.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Xcorner-Windows-Setup
          path: dist/*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx electron-builder --linux AppImage --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: Xcorner-Linux-AppImage
          path: dist/*.AppImage
